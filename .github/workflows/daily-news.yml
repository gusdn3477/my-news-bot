name: Daily News Report Automation

on:
  schedule:
    # 매일 한국 시간 아침 8시 (UTC 23:00) 에 자동 실행
    - cron: '0 23 * * *'
  workflow_dispatch: # 직접 버튼을 눌러 수동으로 실행하고 싶을 때 사용

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 리포지토리에 푸시할 수 있는 권한 부여

    steps:
    - name: 📥 코드 저장소 가져오기 (Checkout)
      uses: actions/checkout@v4

    - name: 🐍 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 📦 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🚀 뉴스 스크립트 실행
      run: python fetch_news.py

    - name: 💾 새 뉴스 리포트 커밋 및 푸시
      run: |
        # 오늘 날짜 변수 생성 (KST 기준)
        TODAY=$(TZ=Asia/Seoul date +'%Y-%m-%d')
        
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 파일이 변경되었거나 추가되었는지 확인 후 커밋
        git add reports/
        if git diff-index --quiet HEAD --; then
          echo "변경 사항이 없습니다."
        else
          git commit -m "docs: 📰 $TODAY 뉴스 리포트 자동 생성"
          git push
        fi
