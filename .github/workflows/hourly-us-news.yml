name: Hourly US News Report Automation

on:
  schedule:
    # 매일 한국 시간 기준 오전 8시, 오후 8시에 자동 실행 (UTC 기준 23:00, 11:00)
    - cron: '0 11,23 * * *'
  workflow_dispatch: # 직접 버튼을 눌러 수동으로 실행하고 싶을 때 사용

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 📥 코드 저장소 가져오기 (Checkout)
      uses: actions/checkout@v4

    - name: 🐍 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 📦 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🚀 미국 실시간 뉴스 분석 스크립트 실행
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python fetch_us_news.py

    - name: 📅 현재 시간 환경변수 설정
      run: |
        echo "TODAY=$(TZ=Asia/Seoul date +'%Y-%m-%d')" >> $GITHUB_ENV
        echo "HOUR=$(TZ=Asia/Seoul date +'%H00')" >> $GITHUB_ENV
        echo "TIME=$(TZ=Asia/Seoul date +'%H:00')" >> $GITHUB_ENV

    - name: 📧 개인 이메일로 리포트 전송
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        # GitHub Secrets에 등록될 변수들
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "📰 [${{ env.TODAY }} ${{ env.TIME }}] 미국 실시간 뉴스 및 분석 리포트"
        to: ${{ secrets.TO_EMAIL }}
        from: "뉴스 자동화 봇"
        body: file://reports/us_news/${{ env.TODAY }}-${{ env.HOUR }}-us-news-report.md
      continue-on-error: true # 초기 이메일 설정이 없더라도 아래의 파일 저장(커밋) 단계는 실행되도록 함

    - name: 💾 새 뉴스 리포트 커밋 및 푸시
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add reports/us_news/
        if git diff-index --quiet HEAD --; then
          echo "변경 사항이 없습니다."
        else
          git commit -m "docs: 🇺🇸 ${{ env.TODAY }} ${{ env.TIME }} 미국 뉴스 분석 리포트 자동 생성"
          git push
        fi
